name: Deploy to GitHub Pages

# Publica la app en https://pharmajava.github.io/Fintech/ en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos minimos necesarios para desplegar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; cancela los anteriores en curso.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # SPA fallback: que las rutas profundas no den 404 en GitHub Pages.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automaticamente la primera vez.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
