<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />

    <!-- SEO -->
    <title>Patrimonio — Controla tu patrimonio neto, privado y cifrado</title>
    <meta
      name="description"
      content="PWA local-first y cifrada para controlar tu patrimonio neto real: activos, pasivos, presupuestos, FIRE y Excel. Tus datos nunca salen de tu dispositivo."
    />
    <meta
      name="keywords"
      content="patrimonio neto, finanzas personales, FIRE, independencia financiera, app privada, cifrado, local-first, presupuesto, inversiones, Excel"
    />
    <meta name="author" content="Patrimonio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pharmajava.github.io/Fintech/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Patrimonio" />
    <meta
      property="og:title"
      content="Patrimonio — Controla tu patrimonio neto, privado y cifrado"
    />
    <meta
      property="og:description"
      content="No es otra app de gastos. Mide tu riqueza neta real con cifrado de extremo a extremo y sin nube."
    />
    <meta property="og:url" content="https://pharmajava.github.io/Fintech/" />
    <meta
      property="og:image"
      content="https://pharmajava.github.io/Fintech/og-image.png"
    />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Patrimonio — Controla tu patrimonio neto, privado y cifrado"
    />
    <meta
      name="twitter:description"
      content="Tu patrimonio neto real, privado y cifrado. Local-first, sin nube."
    />
    <meta
      name="twitter:image"
      content="https://pharmajava.github.io/Fintech/og-image.png"
    />

    <!-- Datos estructurados (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Patrimonio",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web, Android, iOS",
        "description": "PWA local-first y cifrada para controlar tu patrimonio neto real. Privada, offline y sin nube.",
        "url": "https://pharmajava.github.io/Fintech/",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
        "featureList": [
          "Patrimonio neto con histórico",
          "Cifrado AES-GCM local",
          "Presupuestos y movimientos",
          "Motor FIRE y Monte Carlo",
          "Exportación a Excel"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
